
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"> 
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Think">
<title>Think</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --accent: #7c6af7; --accent-glow: rgba(124,106,247,0.3); --accent-dim: rgba(124,106,247,0.15);
    --text: #e8e6f0; --text-dim: #6b697a; --text-mid: #a09eb5;
    --user-bubble: #1a1826; --ai-bubble: #13131c; --danger: #f76a6a; --success: #6af7b0;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow: hidden; }
  body { display: flex; flex-direction: column; height: 100dvh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg); }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: -0.5px; color: var(--text); }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s ease; font-size: 14px; }
  .icon-btn:hover, .icon-btn:active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { display: none; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-dim); text-align: center; padding: 40px 20px; animation: fadeIn 0.6s ease; }
  .empty-icon { width: 56px; height: 56px; border-radius: 50%; background: var(--accent-dim); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 4px; }
  .empty-state h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); }
  .empty-state p { font-size: 12px; line-height: 1.7; max-width: 240px; color: var(--text-mid); }
  .message { display: flex; flex-direction: column; gap: 4px; animation: slideUp 0.25s ease; max-width: 100%; }
  .message.user { align-items: flex-end; } .message.ai { align-items: flex-start; }
  .msg-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); padding: 0 4px; }
  .msg-bubble { padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.7; max-width: 92%; border: 1px solid var(--border); }
  .message.user .msg-bubble { background: var(--user-bubble); border-color: var(--accent); border-bottom-right-radius: 4px; color: var(--text); }
  .message.ai .msg-bubble { background: var(--ai-bubble); border-bottom-left-radius: 4px; color: var(--text); }
  .thinking { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
  .thinking span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.4; animation: pulse 1.2s ease-in-out infinite; }
  .thinking span:nth-child(2) { animation-delay: 0.2s; } .thinking span:nth-child(3) { animation-delay: 0.4s; }
  .input-area { padding: 12px 16px 16px; border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }
  .transcript-preview { font-size: 12px; color: var(--accent); font-style: italic; min-height: 16px; padding: 0 4px; opacity: 0; transition: opacity 0.2s; }
  .transcript-preview.visible { opacity: 1; }
  .input-row { display: flex; align-items: flex-end; gap: 10px; }
  .text-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 11px 14px; font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text); resize: none; outline: none; transition: border-color 0.15s; min-height: 44px; max-height: 120px; line-height: 1.5; }
  .text-input::placeholder { color: var(--text-dim); } .text-input:focus { border-color: var(--accent); }
  .mic-btn { width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--accent); background: var(--accent-dim); color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; flex-shrink: 0; position: relative; }
  .mic-btn svg { width: 22px; height: 22px; }
  .mic-btn:hover { background: var(--accent); color: white; transform: scale(1.05); }
  .mic-btn.recording { background: var(--danger); border-color: var(--danger); color: white; animation: micPulse 1s ease-in-out infinite; }
  .mic-btn.recording::after { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 2px solid var(--danger); opacity: 0.4; animation: ripple 1s ease-out infinite; }
  .send-btn { width: 44px; height: 44px; border-radius: 10px; border: none; background: var(--accent); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s ease; flex-shrink: 0; }
  .send-btn:hover { background: #9585ff; transform: scale(1.05); } .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 18px; height: 18px; }
  .status-bar { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); padding: 0 4px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
  .status-dot.error { background: var(--danger); } .status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: flex-end; z-index: 100; padding: 0; animation: fadeIn 0.2s ease; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 24px 24px 0 0; padding: 28px 24px 40px; width: 100%; animation: slideUp 0.3s ease; }
  .modal h3 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .modal p { font-size: 12px; color: var(--text-mid); line-height: 1.6; margin-bottom: 20px; }
  .modal p a { color: var(--accent); text-decoration: none; }
  .modal input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); outline: none; margin-bottom: 12px; transition: border-color 0.15s; }
  .modal input:focus { border-color: var(--accent); }
  .modal-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: white; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
  .modal-btn:hover { background: #9585ff; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes micPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  @keyframes ripple { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(1.5); opacity: 0; } }
</style>
</head>
<body>
<div class="header">
  <div class="logo">think<span>.</span></div>
  <div class="header-actions">
    <button class="icon-btn" id="clearBtn" title="Clear chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </button>
    <button class="icon-btn" id="keyBtn" title="API Key">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="15" r="4"/><line x1="19" y1="4" x2="10.6" y2="12.4"/><line x1="17" y1="6" x2="19" y2="8"/></svg>
    </button>
  </div>
</div>
<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🧠</div>
    <h2>Ready to think.</h2>
    <p>Tap the mic and start talking. Your thinking partner is listening.</p>
  </div>
</div>
<div class="input-area">
  <div class="transcript-preview" id="transcriptPreview"></div>
  <div class="input-row">
    <textarea class="text-input" id="textInput" placeholder="or type here..." rows="1"></textarea>
    <button class="mic-btn" id="micBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="9" y1="22" x2="15" y2="22"/></svg>
    </button>
    <button class="send-btn" id="sendBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="status-bar"><div class="status-dot" id="statusDot"></div><span id="statusText">ready</span></div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Enter your API key</h3>
    <p>Get a free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>. Stored only in your browser.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
    <button class="modal-btn" id="saveKeyBtn">Save & Start Thinking</button>
  </div>
</div>
<script>
  const SYSTEM_PROMPT = `You are a sharp, thoughtful thinking partner. Your job is to help the user think clearly — not to lecture them. Keep responses concise and conversational. Ask good follow-up questions when it helps. Challenge assumptions gently. Be direct and honest. The user is talking via voice on their phone, so keep responses tight — no walls of text, no bullet points unless truly needed.`;
  let apiKey = localStorage.getItem('think_api_key') || '';
  let messages = [], isLoading = false, recognition = null, isRecording = false;
  const messagesEl = document.getElementById('messages');
  const textInput = document.getElementById('textInput');
  const micBtn = document.getElementById('micBtn');
  const sendBtn = document.getElementById('sendBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const transcriptPreview = document.getElementById('transcriptPreview');
  const modalOverlay = document.getElementById('modalOverlay');
  const apiKeyInput = document.getElementById('apiKeyInput');

  if (apiKey) modalOverlay.style.display = 'none';

  function setStatus(state, text) {
    statusDot.className = 'status-dot' + (state ? ' ' + state : '');
    statusText.textContent = text;
  }

  function addMessage(role, content) {
    messages.push({ role, content });
    const es = document.getElementById('emptyState');
    if (es) es.style.display = 'none';
    const div = document.createElement('div');
    div.className = `message ${role === 'assistant' ? 'ai' : 'user'}`;
    div.innerHTML = `<div class="msg-label">${role === 'user' ? 'you' : 'think'}</div><div class="msg-bubble">${content.replace(/\n/g, '<br>')}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showThinking() {
    const es = document.getElementById('emptyState');
    if (es) es.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'message ai'; div.id = 'thinkingIndicator';
    div.innerHTML = `<div class="msg-label">think</div><div class="msg-bubble thinking"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeThinking() { const el = document.getElementById('thinkingIndicator'); if (el) el.remove(); }

  async function sendMessage(content) {
    if (!content.trim() || isLoading) return;
    if (!apiKey) { modalOverlay.style.display = 'flex'; return; }
    addMessage('user', content);
    textInput.value = ''; textInput.style.height = 'auto'; sendBtn.disabled = true;
    isLoading = true; setStatus('loading', 'thinking...'); showThinking();
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYSTEM_PROMPT, messages: messages.map(m => ({ role: m.role, content: m.content })) })
      });
      const data = await res.json();
      removeThinking();
      if (data.error) { setStatus('error', data.error.message || 'API error'); return; }
      addMessage('assistant', data.content?.[0]?.text || '...');
      setStatus('', 'ready');
    } catch(e) { removeThinking(); setStatus('error', 'connection error'); }
    finally { isLoading = false; }
  }

  textInput.addEventListener('input', () => { textInput.style.height = 'auto'; textInput.style.height = textInput.scrollHeight + 'px'; sendBtn.disabled = !textInput.value.trim(); });
  textInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(textInput.value); } });
  sendBtn.addEventListener('click', () => sendMessage(textInput.value));
  document.getElementById('clearBtn').addEventListener('click', () => {
    messages = []; messagesEl.innerHTML = '';
    const empty = document.createElement('div'); empty.className = 'empty-state'; empty.id = 'emptyState';
    empty.innerHTML = `<div class="empty-icon">🧠</div><h2>Ready to think.</h2><p>Tap the mic and start talking. Your thinking partner is listening.</p>`;
    messagesEl.appendChild(empty); setStatus('', 'ready');
  });
  document.getElementById('keyBtn').addEventListener('click', () => { modalOverlay.style.display = 'flex'; apiKeyInput.value = apiKey; });
  document.getElementById('saveKeyBtn').addEventListener('click', () => {
    const val = apiKeyInput.value.trim();
    if (val) { apiKey = val; localStorage.setItem('think_api_key', val); }
    modalOverlay.style.display = 'none'; setStatus('', 'ready');
  });
  apiKeyInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('saveKeyBtn').click(); });

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    recognition = new SR(); recognition.continuous = false; recognition.interimResults = true; recognition.lang = 'en-US';
    recognition.onstart = () => { isRecording = true; micBtn.classList.add('recording'); setStatus('loading', 'listening...'); transcriptPreview.textContent = ''; transcriptPreview.classList.add('visible'); };
    recognition.onresult = e => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) { const t = e.results[i][0].transcript; if (e.results[i].isFinal) final += t; else interim += t; }
      transcriptPreview.textContent = final || interim;
      if (final) { textInput.value = final; sendBtn.disabled = false; }
    };
    recognition.onend = () => { isRecording = false; micBtn.classList.remove('recording'); transcriptPreview.classList.remove('visible'); setStatus('', 'ready'); if (textInput.value.trim()) setTimeout(() => sendMessage(textInput.value), 300); };
    recognition.onerror = e => { isRecording = false; micBtn.classList.remove('recording'); transcriptPreview.classList.remove('visible'); setStatus('error', e.error === 'not-allowed' ? 'mic access denied' : 'mic error'); };
    micBtn.addEventListener('click', () => { if (isRecording) recognition.stop(); else try { recognition.start(); } catch(e) {} });
  } else {
    micBtn.style.opacity = '0.3'; setStatus('error', 'use Safari on iOS for voice');
  }
</script>
</body>
</html>
